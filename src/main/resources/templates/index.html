<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Examination System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">EXAM SYSTEM</div>
            <p class="subtitle">Modern High-Contrast Noir</p>
        </div>

        <div class="toggle-container">
            <button class="toggle-btn active" onclick="showSection('student')">Student</button>
            <button class="toggle-btn" onclick="showSection('teacher')">Teacher</button>
        </div>

        <div id="student" class="section active">
            <div class="card">
                <h2>Student Registration</h2>
                <form action="/register" method="post">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="rollNo">Roll Number</label>
                        <input type="text" id="rollNo" name="rollNo" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Start Exam</button>
                </form>
            </div>
        </div>

        <div id="teacher" class="section">
            <div class="card">
                <h2>Teacher Access</h2>
                <form action="/teacher-login" method="post">
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(section).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
